{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto mb-10">
    <div class="cute-card p-8">
        <h2 class="text-3xl font-bold text-red-500 mb-6 text-center">Donor Join 🌸</h2>
        
        <form action="/register" method="POST" enctype="multipart/form-data" class="space-y-4">
            
            <div class="p-4 bg-pink-50 rounded-xl border border-pink-100 text-center">
                <label class="block text-sm font-bold text-gray-700 mb-2">Upload Profile Picture 📷</label>
                <input type="file" name="profile_pic" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-red-50 file:text-red-700 hover:file:bg-red-100 cursor-pointer">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Full Name</label>
                <input type="text" name="name" required class="w-full px-4 py-2 mt-1 border border-pink-100 rounded-xl focus:ring-red-400 outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Blood Group</label>
                <select name="blood_group" required class="w-full px-4 py-2 mt-1 border border-pink-100 rounded-xl outline-none">
                    <option value="A+">A+</option><option value="A-">A-</option>
                    <option value="B+">B+</option><option value="B-">B-</option>
                    <option value="O+">O+</option><option value="O-">O-</option>
                    <option value="AB+">AB+</option><option value="AB-">AB-</option>
                </select>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Phone Number</label>
                <input type="text" name="phone" required class="w-full px-4 py-2 mt-1 border border-pink-100 rounded-xl outline-none">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Address</label>
                <textarea name="address" required class="w-full px-4 py-2 mt-1 border border-pink-100 rounded-xl outline-none"></textarea>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" name="password" required class="w-full px-4 py-2 mt-1 border border-pink-100 rounded-xl outline-none">
            </div>

            <button type="submit" class="w-full btn-crimson py-3 font-bold text-lg mt-4 shadow-lg">
                Create My Profile ✨
            </button>
        </form>
    </div>
</div>
{% endblock %}
