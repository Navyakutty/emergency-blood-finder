{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto">
    <div class="cute-card p-8">
        <h2 class="text-3xl font-bold text-red-500 mb-6 text-center">Hospital Portal 🏥</h2>
        <p class="text-center text-gray-500 mb-6">Log in to send emergency blood requests.</p>
        
        {% if error %}
        <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded-xl mb-4 text-center font-bold shadow-sm">
            {{ error }}
        </div>
        {% endif %}

        <form action="/login-hospital" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium text-gray-700">Hospital ID / Name</label>
                <input type="text" name="hospital_name" required class="w-full px-4 py-2 mt-1 border border-pink-100 rounded-xl outline-none focus:border-red-400">
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" name="password" required class="w-full px-4 py-2 mt-1 border border-pink-100 rounded-xl outline-none focus:border-red-400">
            </div>

            <button type="submit" class="w-full btn-crimson py-3 font-bold text-lg mt-4 shadow-lg">
                Enter Dashboard 🚀
            </button>
        </form>
    </div>
</div>
{% endblock %}
