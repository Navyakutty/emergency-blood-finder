{% extends "base.html" %}
{% block content %}
<div class="max-w-md mx-auto mt-10">
    <div class="cute-card p-8 text-center border-t-4 border-red-500">
        <h2 class="text-3xl font-bold text-red-500 mb-2">Screening Passed! 🎉</h2>
        <p class="text-gray-600 mb-6">Thank you for stepping up. How quickly can you reach the hospital?</p>
        
        <form action="/eta/{{ request_id }}" method="POST" class="space-y-4">
            <div>
                <select name="arrival_time" required class="w-full px-4 py-3 border border-pink-200 rounded-xl outline-none focus:ring-red-400 bg-gray-50 font-bold text-gray-700 text-lg">
                    <option value="" disabled selected>Select your arrival time...</option>
                    <option value="Within 15 mins">🚀 Within 15 minutes</option>
                    <option value="Within 30 mins">🏃‍♂️ Within 30 minutes</option>
                    <option value="Within 1 hour">🚗 Within 1 hour</option>
                    <option value="More than 1 hour">🚶‍♂️ More than 1 hour</option>
                </select>
            </div>

            <button type="submit" class="w-full btn-crimson py-4 font-bold text-xl mt-4 shadow-lg">
                Confirm My Arrival ✨
            </button>
        </form>
    </div>
</div>
{% endblock %}
